<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>1 in X Game</title>

<style>
body{
  font-family:Arial,sans-serif;
  text-align:center;
  margin:0;
  background:#f0f0f0;
  touch-action:manipulation;
}

h1{margin-top:40px;}

#tryButton{
  padding:18px 35px;
  font-size:20px;
  margin-top:30px;
  border:none;
  border-radius:10px;
  background:#2f7cff;
  color:white;
}

#tryButton:active{
  transform:scale(0.96);
}

.info{
  margin-top:15px;
  font-size:18px;
  color:#555;
}

#resultDisplay{
  font-size:26px;
  font-weight:bold;
  color:green;
  height:35px;
}

canvas{
  position:fixed;
  top:0;
  left:0;
  pointer-events:none;
}
</style>
</head>

<body>

<h1>1 in X Game</h1>

<button id="tryButton">Click Fast!</button>

<div class="info" id="attemptsCounter">Attempts: 0</div>
<div class="info" id="oddsDisplay"></div>
<div class="info" id="percentDisplay"></div>

<div class="info">
  Game Difficulty: <span id="gameLabel">10 Million</span><br>
  <input type="range" id="gameSlider" min="0" max="5" value="3">
</div>

<div class="info">
  Auto Click Speed: <span id="speedLabel">10</span> CPS<br>
  <input type="range" id="speedSlider" min="1" max="10000" value="10">
</div>

<div id="resultDisplay"></div>

<canvas id="confettiCanvas"></canvas>

<script>
// ---------- PREVENT ZOOM ----------
window.addEventListener('gesturestart',e=>e.preventDefault());

// ---------- ELEMENTS ----------
const button=document.getElementById('tryButton');
const attemptsCounter=document.getElementById('attemptsCounter');
const oddsDisplay=document.getElementById('oddsDisplay');
const percentDisplay=document.getElementById('percentDisplay');
const resultDisplay=document.getElementById('resultDisplay');

const speedSlider=document.getElementById('speedSlider');
const speedLabel=document.getElementById('speedLabel');

const gameSlider=document.getElementById("gameSlider");
const gameLabel=document.getElementById("gameLabel");

// ---------- GAMES ----------
const games=[
  {name:"1 Thousand", odds:1000},
  {name:"10 Thousand", odds:10000},
  {name:"100 Thousand", odds:100000},
  {name:"10 Million", odds:10000000},
  {name:"100 Million", odds:100000000},
  {name:"1 Billion", odds:1000000000}
];

let currentGameIndex=parseInt(localStorage.getItem("selectedGame"))||3;
gameSlider.value=currentGameIndex;

let oddsPerTry=games[currentGameIndex].odds;
gameLabel.textContent=games[currentGameIndex].name;

// ---------- SAVES PER GAME ----------
function getSaveKey(){
  return "millionGameAttempts_"+currentGameIndex;
}

let attempts=parseInt(localStorage.getItem(getSaveKey()))||0;

// ---------- STATS ----------
function updateStats(){

  const probability=
    1-Math.pow((oddsPerTry-1)/oddsPerTry,attempts);

  const percent=probability*100;

  const equivalentOdds=
    probability>0?Math.round(1/probability):oddsPerTry;

  attemptsCounter.textContent=
    "Attempts: "+attempts.toLocaleString();

  oddsDisplay.textContent=
    "Current Odds: 1 in "+equivalentOdds.toLocaleString();

  percentDisplay.textContent=
    "Win Chance: "+percent.toFixed(6)+"%";

  localStorage.setItem(getSaveKey(),attempts);
}

// ---------- CONFETTI ----------
const canvas=document.getElementById('confettiCanvas');
const ctx=canvas.getContext('2d');

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let confetti=[];

function createConfetti(){
  for(let i=0;i<180;i++){
    confetti.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height-canvas.height,
      r:Math.random()*6+4,
      color:`hsl(${Math.random()*360},100%,50%)`,
      tilt:Math.random()*10-10,
      tiltAngle:0,
      tiltSpeed:Math.random()*0.07+0.05
    });
  }
}

function drawConfetti(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  confetti.forEach((p,i)=>{
    ctx.beginPath();
    ctx.lineWidth=p.r/2;
    ctx.strokeStyle=p.color;
    ctx.moveTo(p.x+p.tilt,p.y);
    ctx.lineTo(p.x+p.tilt,p.y+p.r);
    ctx.stroke();

    p.tiltAngle+=p.tiltSpeed;
    p.y+=3+p.r/2;
    p.tilt=Math.sin(p.tiltAngle)*15;

    if(p.y>canvas.height) confetti.splice(i,1);
  });

  if(confetti.length>0) requestAnimationFrame(drawConfetti);
}

function launchConfetti(){
  createConfetti();
  drawConfetti();
}

// ---------- ATTEMPT ----------
function doAttempt(){
  attempts++;

  const roll=Math.floor(Math.random()*oddsPerTry)+1;

  if(roll===1){
    resultDisplay.textContent="🎉 YOU WON! 🎉";
    launchConfetti();
  }

  updateStats();
}

// ---------- HIGH PERFORMANCE AUTO CLICK ----------
let clicking=false;
let clicksPerSecond=10;
let lastFrameTime=0;
let clickAccumulator=0;

speedSlider.addEventListener("input",()=>{
  clicksPerSecond=parseInt(speedSlider.value);
  speedLabel.textContent=clicksPerSecond.toLocaleString();
});

function autoLoop(timestamp){

  if(!clicking) return;

  if(!lastFrameTime) lastFrameTime=timestamp;

  const delta=(timestamp-lastFrameTime)/1000;
  lastFrameTime=timestamp;

  clickAccumulator+=clicksPerSecond*delta;

  while(clickAccumulator>=1){
    doAttempt();
    clickAccumulator--;
  }

  requestAnimationFrame(autoLoop);
}

function startAutoClick(e){
  e.preventDefault();
  if(clicking) return;

  clicking=true;
  lastFrameTime=0;
  requestAnimationFrame(autoLoop);
}

function stopAutoClick(){
  clicking=false;
}

button.addEventListener("pointerdown",startAutoClick);
button.addEventListener("pointerup",stopAutoClick);
button.addEventListener("pointerleave",stopAutoClick);
button.addEventListener("pointercancel",stopAutoClick);

// ---------- GAME SWITCH ----------
gameSlider.addEventListener("input",()=>{

  currentGameIndex=parseInt(gameSlider.value);
  localStorage.setItem("selectedGame",currentGameIndex);

  oddsPerTry=games[currentGameIndex].odds;
  gameLabel.textContent=games[currentGameIndex].name;

  attempts=parseInt(localStorage.getItem(getSaveKey()))||0;

  updateStats();
});

// ---------- INIT ----------
updateStats();

window.addEventListener('resize',()=>{
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
});
</script>

</body>
</html>
