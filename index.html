<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- Fixed viewport to prevent zoom -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>1 in a Million Game</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 0;
    background: #f0f0f0;
    overflow-x: hidden;
    touch-action: manipulation; /* Prevents double-tap zoom */
  }
  h1 { margin-top: 40px; }
  button {
    padding: 15px 30px;
    font-size: 18px;
    cursor: pointer;
    margin-top: 30px;
  }
  #onlineCounter, #attemptsCounter, #oddsDisplay {
    margin-top: 15px;
    font-size: 16px;
    color: #555;
  }
  canvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
  }
</style>
</head>
<body>

<h1>1 in a Million Game</h1>
<button id="tryButton">Try Your Luck!</button>
<div id="onlineCounter">Users Online: 0</div>
<div id="attemptsCounter">Attempts: 0</div>
<div id="oddsDisplay">Your Odds: 1 in 1,000,000</div>

<canvas id="confettiCanvas"></canvas>

<script>
  // Disable pinch/gesture zoom completely
  window.addEventListener('gesturestart', function(e) {
    e.preventDefault();
  });

  const button = document.getElementById('tryButton');
  const onlineCounter = document.getElementById('onlineCounter');
  const attemptsCounter = document.getElementById('attemptsCounter');
  const oddsDisplay = document.getElementById('oddsDisplay');

  let attempts = 0;
  let usersOnline = Math.floor(Math.random() * 1000) + 100;

  // Simulate live online users
  setInterval(() => {
    usersOnline += Math.floor(Math.random() * 5) - 2; // random fluctuation
    if (usersOnline < 0) usersOnline = 0;
    onlineCounter.textContent = 'Users Online: ' + usersOnline;
  }, 2000);

  // Confetti setup
  const canvas = document.getElementById('confettiCanvas');
  const ctx = canvas.getContext('2d');
  let confettiParticles = [];
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  function createConfetti() {
    for (let i = 0; i < 150; i++) {
      confettiParticles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height - canvas.height,
        r: Math.random() * 6 + 4,
        d: Math.random() * 150 + 50,
        color: `hsl(${Math.random() * 360}, 100%, 50%)`,
        tilt: Math.random() * 10 - 10,
        tiltAngleIncremental: Math.random() * 0.07 + 0.05,
        tiltAngle: 0
      });
    }
  }

  function drawConfetti() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    confettiParticles.forEach((p, index) => {
      ctx.beginPath();
      ctx.lineWidth = p.r / 2;
      ctx.strokeStyle = p.color;
      ctx.moveTo(p.x + p.tilt + p.r / 4, p.y);
      ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 4);
      ctx.stroke();
      p.tiltAngle += p.tiltAngleIncremental;
      p.y += (Math.cos(p.d) + 3 + p.r / 2) / 2;
      p.tilt = Math.sin(p.tiltAngle) * 15;
      if (p.y > canvas.height) confettiParticles.splice(index, 1);
    });
    if (confettiParticles.length > 0) requestAnimationFrame(drawConfetti);
  }

  function launchConfetti() {
    createConfetti();
    drawConfetti();
  }

  // Main game logic
  button.addEventListener('click', () => {
    attempts++;
    attemptsCounter.textContent = 'Attempts: ' + attempts;

    const chance = Math.floor(Math.random() * 1000000) + 1;
    oddsDisplay.textContent = 'Your Odds: 1 in 1,000,000';

    if (chance === 1) {
      launchConfetti();
      alert('🎉 Congratulations! You won! 🎉');
    } else {
      alert('Not this time. Keep trying!');
    }
  });

  // Resize canvas on window resize
  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });
</script>

</body>
</html>
