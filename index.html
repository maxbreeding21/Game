<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>1 in a Million Game</title>

<style>
body{
  font-family:Arial,sans-serif;
  text-align:center;
  margin:0;
  background:#f0f0f0;
  touch-action:manipulation;
}

h1{margin-top:40px;}

#tryButton{
  padding:18px 35px;
  font-size:20px;
  margin-top:30px;
  border:none;
  border-radius:10px;
  background:#2f7cff;
  color:white;
}

#tryButton:active{
  transform:scale(0.96);
}

.info{
  margin-top:15px;
  font-size:18px;
  color:#555;
}

#resultDisplay{
  font-size:26px;
  font-weight:bold;
  color:green;
  height:35px;
}

canvas{
  position:fixed;
  top:0;
  left:0;
  pointer-events:none;
}
</style>
</head>

<body>

<h1>1 in a Million Game</h1>

<button id="tryButton">Click Fast!</button>

<div class="info" id="attemptsCounter">Attempts: 0</div>
<div class="info" id="oddsDisplay">Current Odds: 1 in 10,000,000</div>
<div class="info" id="percentDisplay">Win Chance: 0%</div>
<div id="resultDisplay"></div>

<canvas id="confettiCanvas"></canvas>

<script>
// ---------- PREVENT ZOOM ----------
window.addEventListener('gesturestart',e=>e.preventDefault());

// ---------- SAVE ----------
const SAVE_KEY="millionGameAttempts";
let attempts=parseInt(localStorage.getItem(SAVE_KEY))||0;

const button=document.getElementById('tryButton');
const attemptsCounter=document.getElementById('attemptsCounter');
const oddsDisplay=document.getElementById('oddsDisplay');
const percentDisplay=document.getElementById('percentDisplay');
const resultDisplay=document.getElementById('resultDisplay');

const oddsPerTry=10000000;

// ---------- STATS ----------
function updateStats(){

  const probability=
    1-Math.pow((oddsPerTry-1)/oddsPerTry,attempts);

  const percent=probability*100;

  const equivalentOdds=
    probability>0?Math.round(1/probability):oddsPerTry;

  attemptsCounter.textContent=
    "Attempts: "+attempts.toLocaleString();

  oddsDisplay.textContent=
    "Current Odds: 1 in "+equivalentOdds.toLocaleString();

  percentDisplay.textContent=
    "Win Chance: "+percent.toFixed(6)+"%";

  localStorage.setItem(SAVE_KEY,attempts);
}

// ---------- CONFETTI ----------
const canvas=document.getElementById('confettiCanvas');
const ctx=canvas.getContext('2d');

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let confetti=[];

function createConfetti(){
  for(let i=0;i<180;i++){
    confetti.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height-canvas.height,
      r:Math.random()*6+4,
      color:`hsl(${Math.random()*360},100%,50%)`,
      tilt:Math.random()*10-10,
      tiltAngle:0,
      tiltSpeed:Math.random()*0.07+0.05
    });
  }
}

function drawConfetti(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  confetti.forEach((p,i)=>{
    ctx.beginPath();
    ctx.lineWidth=p.r/2;
    ctx.strokeStyle=p.color;
    ctx.moveTo(p.x+p.tilt,p.y);
    ctx.lineTo(p.x+p.tilt,p.y+p.r);
    ctx.stroke();

    p.tiltAngle+=p.tiltSpeed;
    p.y+=3+p.r/2;
    p.tilt=Math.sin(p.tiltAngle)*15;

    if(p.y>canvas.height) confetti.splice(i,1);
  });

  if(confetti.length>0) requestAnimationFrame(drawConfetti);
}

function launchConfetti(){
  createConfetti();
  drawConfetti();
}

// ---------- ATTEMPT ----------
function doAttempt(){
  attempts++;
  updateStats();

  const roll=Math.floor(Math.random()*oddsPerTry)+1;

  if(roll===1){
    resultDisplay.textContent="🎉 YOU WON! 🎉";
    launchConfetti();
  }else{
    resultDisplay.textContent="";
  }
}

// ---------- MOBILE SAFE AUTO CLICK ----------
let autoClickInterval=null;

function startAutoClick(e){
  e.preventDefault();

  if(autoClickInterval) return;

  doAttempt(); // immediate click

  autoClickInterval=setInterval(doAttempt,100); // 10 CPS
}

function stopAutoClick(){
  clearInterval(autoClickInterval);
  autoClickInterval=null;
}

// pointer events work best across phone + desktop
button.addEventListener("pointerdown", startAutoClick);
button.addEventListener("pointerup", stopAutoClick);
button.addEventListener("pointerleave", stopAutoClick);
button.addEventListener("pointercancel", stopAutoClick);

// ---------- INIT ----------
updateStats();

window.addEventListener('resize',()=>{
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
});
</script>

</body>
</html>
